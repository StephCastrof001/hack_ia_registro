<!doctype html>
<!--
  PROTOTYPE v4 — badge HACK IA (issue #10). THROWAWAY.
  Decisiones owner (v4):
   - Mensaje "Asistiré al lanzamiento de la comunidad [LOGO]" en AMBAS vistas (pantalla + descarga).
     HACK IA = logo, no texto.
   - 3 LOOKS completos (no solo fondo): A Clean-Mesh / B Ticket / C Hero-Photo.
   - Vista: Pantalla (con QR) vs Descarga/compartir (sin QR). QR nunca viaja en redes.
  Best-practices tops (investigado): QR abajo + zona blanca, nombre grande, 2-3 datos,
   QR dinámico/rotativo evita reuso de screenshots (refuerza quitar-QR-al-compartir).
  Nota satori: NO blur/animación/filtros SVG. Sí gradientes radiales+lineales (mesh) y PNG.
  Correr: start prototype/badge-prototype-v4.html
-->
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PROTOTYPE v4 — Badge HACK IA</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --canvas: #0c0c14; --primary: #6f5ff2; --accent: #00cfaa;
    --text: #e8e8f0; --muted: #9a9ab0; --qrbg: #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Space Grotesk", system-ui, sans-serif;
    background: #050509; color: var(--text);
    min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 40px 16px 130px; gap: 14px;
  }
  .stage { display: flex; gap: 32px; flex-wrap: wrap; align-items: flex-start; justify-content: center; }

  .badge {
    width: 360px; height: 540px; background: var(--canvas);
    border-radius: 24px; overflow: hidden; position: relative;
    display: flex; flex-direction: column;
  }
  .layer { position: absolute; inset: 0; z-index: 0; }
  .content { position: relative; z-index: 1; display: flex; flex-direction: column;
             align-items: center; text-align: center; width: 100%; height: 100%; padding: 24px; }
  .logo { height: 24px; width: auto; }
  .logo-inline { height: 30px; width: auto; display:block; margin: 6px auto 0; }
  .photo { object-fit: cover; background: #1a1a26; }
  .name { font-weight: 700; line-height: 1.05; }
  .uline { width: 48px; height: 4px; background: var(--primary); border-radius: 2px; margin: 12px auto; }
  .role { color: var(--accent); font-weight: 500; font-size: 16px; }
  .company { color: var(--muted); font-weight: 400; font-size: 13px; margin-top: 2px; }
  .topmsg { font-weight: 700; font-size: 17px; line-height: 1.3; }
  .qrtile { background: var(--qrbg); border-radius: 14px; padding: 10px; display: inline-flex; }
  .qrtile img { display: block; width: 110px; height: 110px; }
  .tag { font-size: 11px; letter-spacing: .12em; color: var(--muted); text-transform: uppercase; }
  .foot { margin-top: auto; display: flex; flex-direction: column; align-items: center; gap: 10px; width: 100%; }
  .hide { display: none !important; }

  /* ===== LOOK A — Clean Mesh ===== */
  .lA .layer {
    background:
      radial-gradient(150px 150px at 18% 10%, rgba(111,95,242,.40), transparent 70%),
      radial-gradient(180px 180px at 88% 18%, rgba(0,207,170,.26), transparent 70%),
      radial-gradient(240px 220px at 50% 120%, rgba(111,95,242,.34), transparent 70%);
  }
  .lA .content { align-items: center; text-align: center; }
  .lA .topmsg { margin-top: 4px; }
  .lA .photo { width: 146px; height: 146px; border-radius: 50%; border: 3px solid var(--primary); margin-top: 16px; }
  .lA .name { font-size: 28px; margin-top: 16px; }

  /* ===== LOOK B — Ticket (header band + perforación + stub) ===== */
  .lB .content { padding: 0; }
  .lB .band { background: linear-gradient(90deg, var(--primary), var(--accent));
              width: 100%; padding: 16px 20px; text-align: center; }
  .lB .band .topmsg { color: #fff; font-size: 15px; }
  .lB .band .logo-inline { filter: brightness(0) invert(1); height: 26px; }
  .lB .mid { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 20px 24px; }
  .lB .photo { width: 130px; height: 130px; border-radius: 50%; border: 3px solid var(--accent); }
  .lB .name { font-size: 26px; margin-top: 14px; }
  .lB .perf { width: 100%; border-top: 2px dashed #2a2a3a; position: relative; }
  .lB .stub { background: rgba(255,255,255,.03); padding: 16px; width: 100%;
              display: flex; flex-direction: column; align-items: center; gap: 8px; }

  /* ===== LOOK C — Hero Photo (foto grande arriba con glow + nombre encima) ===== */
  .lC .content { padding: 0; }
  .lC .hero { position: relative; width: 100%; height: 250px; }
  .lC .hero .photo { width: 100%; height: 100%; }
  .lC .hero .veil { position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(12,12,20,.1) 0%, rgba(12,12,20,.95) 100%); }
  .lC .hero .msgwrap { position: absolute; top: 14px; left: 0; right: 0; text-align: center; z-index: 2; }
  .lC .hero .msgwrap .topmsg { font-size: 15px; text-shadow: 0 2px 8px rgba(0,0,0,.7); }
  .lC .hero .namewrap { position: absolute; bottom: 12px; left: 20px; right: 20px; z-index: 2; text-align: left; }
  .lC .hero .name { font-size: 28px; }
  .lC .below { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 16px 24px 24px; width: 100%; }
  .lC .layer {
    background: radial-gradient(240px 200px at 50% 120%, rgba(0,207,170,.30), transparent 70%), var(--canvas);
  }

  .bar-fixed {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    background: #14141f; border: 1px solid #2a2a3a; border-radius: 14px;
    padding: 10px 14px; display: flex; gap: 18px; align-items: center;
    box-shadow: 0 10px 40px rgba(0,0,0,.5); z-index: 10;
  }
  .bar-fixed .grp { display:flex; gap:6px; align-items:center; }
  .bar-fixed label { font-size: 11px; color: var(--muted); margin-right: 4px; }
  .bar-fixed button {
    font-family: inherit; font-size: 13px; font-weight: 500;
    background: #1f1f2e; color: var(--text); border: 1px solid #2a2a3a;
    border-radius: 8px; padding: 6px 12px; cursor: pointer;
  }
  .bar-fixed button.on { background: var(--primary); border-color: var(--primary); color: #fff; }
  .state { font-size: 12px; color: var(--muted); }
  .caption { font-size: 12px; color: var(--muted); max-width: 380px; text-align: center; }
</style>
</head>
<body>
  <div class="stage" id="stage"></div>
  <div class="caption" id="caption"></div>

  <div class="bar-fixed">
    <div class="grp"><label>Look</label>
      <button data-set="l" data-val="A">A · Clean Mesh</button>
      <button data-set="l" data-val="B">B · Ticket</button>
      <button data-set="l" data-val="C">C · Hero Photo</button>
    </div>
    <div class="grp"><label>Vista</label>
      <button data-set="t" data-val="entrada">Pantalla (con QR)</button>
      <button data-set="t" data-val="social">Descarga (sin QR)</button>
    </div>
    <span class="state" id="state"></span>
  </div>

<script>
  const LOGO = "../Logo/hackia_primary_dark.png";
  const QR = "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://eventos.klipso.xxx/r/SAMPLE-TOKEN";
  const PHOTO = "https://i.pravatar.cc/400?img=47";
  const MSG = `Asistiré al lanzamiento de la comunidad <img class="logo-inline" src="${LOGO}" alt="HACK IA" onerror="this.style.display='none'"/>`;
  const qrBlock = (show) => show ? `<div class="qrtile"><img src="${QR}" alt="QR"/></div>` : "";
  const tagBlock = (show) => show ? `<span class="tag">Entrada · escanear en puerta</span>` : `<span class="tag">#HACKIA</span>`;

  function look(l, t) {
    const showQR = t === "entrada";
    if (l === "A") {
      return `<div class="badge lA"><div class="layer"></div><div class="content">
        <div class="topmsg">${MSG}</div>
        <img class="photo" src="${PHOTO}"/>
        <div class="name">Stephanie Castro</div><div class="uline"></div>
        <div class="role">PM</div><div class="company">Klipso</div>
        <div class="foot">${tagBlock(showQR)}${qrBlock(showQR)}</div>
      </div></div>`;
    }
    if (l === "B") {
      return `<div class="badge lB"><div class="content">
        <div class="band"><div class="topmsg">Asistiré al lanzamiento de la comunidad</div>
          <img class="logo-inline" src="${LOGO}" onerror="this.style.display='none'"/></div>
        <div class="mid">
          <img class="photo" src="${PHOTO}"/>
          <div class="name">Stephanie Castro</div><div class="uline"></div>
          <div class="role">PM</div><div class="company">Klipso</div>
        </div>
        <div class="perf"></div>
        <div class="stub">${tagBlock(showQR)}${qrBlock(showQR)}</div>
      </div></div>`;
    }
    return `<div class="badge lC"><div class="layer"></div><div class="content">
      <div class="hero">
        <img class="photo" src="${PHOTO}"/><div class="veil"></div>
        <div class="msgwrap"><div class="topmsg">Asistiré al lanzamiento de la comunidad
          <img class="logo-inline" src="${LOGO}" onerror="this.style.display='none'"/></div></div>
        <div class="namewrap"><div class="name">Stephanie Castro</div></div>
      </div>
      <div class="below">
        <div class="role">PM</div><div class="company">Klipso</div>
        <div class="foot">${tagBlock(showQR)}${qrBlock(showQR)}</div>
      </div>
    </div></div>`;
  }

  const stage = document.getElementById("stage");
  let l = "A", t = "entrada";
  function render() {
    stage.innerHTML = look(l, t);
    document.querySelectorAll(".bar-fixed button").forEach(btn => {
      const set = btn.dataset.set, val = btn.dataset.val;
      btn.classList.toggle("on", (set === "l" && val === l) || (set === "t" && val === t));
    });
    document.getElementById("state").textContent = `look=${l} · vista=${t}`;
    document.getElementById("caption").textContent = t === "entrada"
      ? "PANTALLA: el asistente ve su badge con QR para escanear en puerta."
      : "DESCARGA/COMPARTE: mismo badge SIN QR. El QR nunca viaja en redes (anti-reuso de screenshot).";
  }
  document.querySelectorAll(".bar-fixed button").forEach(btn => {
    btn.addEventListener("click", () => {
      if (btn.dataset.set === "l") l = btn.dataset.val; else t = btn.dataset.val;
      render();
    });
  });
  render();
</script>

<!--
  ============ VERDICTO (#10) — APROBADO 2026-06-29 ============
  Look elegido: A · Clean Mesh (fondo mesh radiales, satori-safe).
  Mensaje "Asistiré al lanzamiento de la comunidad [LOGO HACK IA]" ARRIBA en AMBAS vistas. Logo, no texto.
  Vista PANTALLA = badge CON QR (lo ve el usuario para escanear en puerta).
  Vista DESCARGA/COMPARTIR = badge SIN QR (solo mensaje + foto). QR nunca viaja en redes.
  Refinamiento de color/detalle = baja prioridad, cambiar luego.
  -> #6 render base satori (Look A, mesh, mensaje top, foto, nombre/rol/company)
  -> #7 QR + brand: 2 renders (con/sin QR). Foto Space Grotesk Bold, canvas #0c0c14.
-->
</body>
</html>
